# Configuration statique de routage de l'API Gateway CustHome.
# Lue une seule fois au démarrage de l'exécutable (US-01).
server:
  port: 8080

routes:
  - path_prefix: "/api/auth"
    destination_url: "http://localhost:8081"
    strip_prefix: true
  - path_prefix: "/api/users"
    destination_url: "http://localhost:8082"
    strip_prefix: false
