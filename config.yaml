# Configuration statique de routage de l'API Gateway CustHome.
# Lue une seule fois au démarrage de l'exécutable (US-01).
server:
  port: 8180
  # US-09 : délai d'attente maximum d'une réponse backend (504 au-delà).
  timeout_seconds: 5
  # US-12 : taille maximale du corps de requête (413 au-delà).
  max_body_bytes: 10485760
  # US-11 : verbosité des logs JSON (DEBUG, INFO, WARN, ERROR).
  log_level: "INFO"
  # US-08 : limitation de trafic par IP (Token Bucket).
  rate_limit:
    enabled: true
    requests_per_second: 10
    burst: 20
    # US-13 : X-Forwarded-For n'est honoré que derrière ces proxies (IP ou CIDR).
    # Vide = seule l'adresse TCP (RemoteAddr) fait foi.
    trusted_proxies: []
  cors:
    allowed_origins:
      - "http://localhost:3200"
      - "http://localhost:3201"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "X-Correlation-ID"
    # US-15 : durée de cache du preflight par les navigateurs (secondes).
    max_age_seconds: 600

# US-05 : endpoint de validation du microservice d'authentification (Rust).
auth_service_url: "http://localhost:8181/validate"
# US-15 : délai d'attente maximum du service d'authentification (millisecondes).
auth_service_timeout_ms: 100
# US-11 (sprint Api Authenticator) : cookie HttpOnly posé au login par
# l'Authenticator, lu en complément du header Authorization (qui prime).
auth_cookie_name: "ch_token"
# US-12 (sprint Api Authenticator) : page de connexion du front d'auth.
# Navigateur (Accept: text/html) non authentifié → 302 {url}?redirect={page demandée}.
# Les appels API gardent leur 401. Vide = jamais de redirection.
auth_front_url: "http://localhost:3200/login"

routes:
  - path_prefix: "/api/auth"
    destination_url: "http://localhost:8181"
    strip_prefix: true
    require_auth: false # routes publiques (login, register…)
    # US-09 (sprint Api Authenticator) : portail transmis en X-Portal au /validate.
    portal: "custhome"
  # US-8.4 : portail d'administration (CH-Portail-Admin). require_auth + rôle
  # "admin" sur "portail_admin" résolu par l'Authenticator. strip_prefix → les
  # appels /api/admin/users, /api/admin/roles… atteignent /users, /roles sur :8081.
  - path_prefix: "/api/admin"
    destination_url: "http://localhost:8181"
    strip_prefix: true
    require_auth: true
    portal: "portail_admin"
