# Configuration statique de routage de l'API Gateway CustHome.
# Lue une seule fois au démarrage de l'exécutable (US-01).
server:
  port: 8080
  # US-08 : limitation de trafic par IP (Token Bucket).
  rate_limit:
    enabled: true
    requests_per_second: 10
    burst: 20
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "https://mon-app-front.com"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "X-Correlation-ID"

# US-05 : endpoint de validation du microservice d'authentification (Rust).
auth_service_url: "http://localhost:8081/validate"

routes:
  - path_prefix: "/api/auth"
    destination_url: "http://localhost:8081"
    strip_prefix: true
    require_auth: false # routes publiques (login, register…)
  - path_prefix: "/api/users"
    destination_url: "http://localhost:8082"
    strip_prefix: false
    require_auth: true
