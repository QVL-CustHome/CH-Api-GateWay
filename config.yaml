server:
  port: 8180
  timeout_seconds: 5
  max_body_bytes: 10485760
  log_level: "INFO"
  rate_limit:
    enabled: true
    requests_per_second: 10
    burst: 20
    trusted_proxies: []
  cors:
    allowed_origins:
      - "http://localhost:3200"
      - "http://localhost:3201"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "X-Correlation-ID"
    max_age_seconds: 600

auth_service_url: "http://localhost:8181/validate"
auth_service_timeout_ms: 100
auth_cookie_name: "ch_token"
auth_front_url: "http://localhost:3200/login"

routes:
  - path_prefix: "/api/auth"
    destination_url: "http://localhost:8181"
    strip_prefix: true
    require_auth: false
    portal: "portail_home"
  - path_prefix: "/api/admin"
    destination_url: "http://localhost:8181"
    strip_prefix: true
    require_auth: true
    portal: "portail_admin"
  - path_prefix: "/api/drive"
    destination_url: "http://localhost:8182"
    strip_prefix: true
    require_auth: true
    portal: "portail_drive"
    max_body_bytes: 17825792
    timeout_seconds: 120
  - path_prefix: "/api/budgy"
    destination_url: "http://localhost:8183"
    strip_prefix: true
    require_auth: true
    portal: "portail_budgy"
